name: Update Dependencies

on:
  schedule:
    - cron: "0 3 * * 1"  # every Monday
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        run: |
          pip install poetry

      - name: Install dependencies
        run: |
          poetry install

      - name: Update dependencies
        run: |
          poetry update

      - name: Run tests
        run: |
          poetry run pytest

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(deps): update dependencies"
          title: "chore(deps): automated dependency updates"
          body: |
            This PR updates project dependencies using Poetry.

            - Ran `poetry update`
            - Regenerated lockfile
            - Executed test suite
          branch: chore/dependency-updates
          delete-branch: true
